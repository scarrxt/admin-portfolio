<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Login</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../css/main.css">
	<link rel="stylesheet" href="../css/admin.css">
	<script src="../js/api.js" defer></script>
	<script src="../js/auth.js" defer></script>
	<script src="../js/admin/layout.js" defer></script>
	<script defer>
		window.addEventListener('DOMContentLoaded', () => {
			const form = document.getElementById('loginForm');
			const errorNode = document.getElementById('loginError');
			const loadingNode = document.getElementById('loginLoading');

			form.addEventListener('submit', async (event) => {
				event.preventDefault();
				loadingNode.classList.remove('hidden');
				errorNode.classList.add('hidden');

				const email = form.email.value.trim();
				const password = form.password.value.trim();
				const error = await handleLogin(email, password);

				loadingNode.classList.add('hidden');
				if (error) {
					errorNode.textContent = error;
					errorNode.classList.remove('hidden');
				}
			});
		});
	</script>
</head>
<body>
	<main class="login-shell">
		<section class="login-card card">
			<h1>Admin Login</h1>
			<p class="muted">Use your dashboard credentials to continue.</p>
			<form id="loginForm" class="form-grid" style="margin-top: 1rem;">
				<div>
					<label for="email">Email</label>
					<input id="email" name="email" type="email" required>
				</div>
				<div>
					<label for="password">Password</label>
					<input id="password" name="password" type="password" required>
				</div>
				<button type="submit">Sign In</button>
			</form>
			<p id="loginLoading" class="loading hidden">Signing in...</p>
			<p id="loginError" class="error-msg hidden"></p>
		</section>
	</main>
</body>
</html>
