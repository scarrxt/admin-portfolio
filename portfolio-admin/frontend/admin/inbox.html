<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Inbox</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="../css/main.css">
	<link rel="stylesheet" href="../css/admin.css">
	<script src="../js/api.js" defer></script>
	<script src="../js/auth.js" defer></script>
	<script src="../js/admin/layout.js" defer></script>
	<script src="../js/admin/inbox.js" defer></script>
</head>
<body>
	<div class="admin-body">
		<aside class="admin-sidebar">
			<h2 class="admin-brand">Portfolio Admin</h2>
			<nav class="admin-nav">
				<a data-nav-link href="index.html">Overview</a>
				<a data-nav-link href="projects.html">Projects</a>
				<a data-nav-link href="inbox.html">Inbox</a>
				<a data-nav-link href="settings.html">Settings</a>
			</nav>
		</aside>

		<main class="admin-main">
			<header class="admin-header">
				<h1>Inbox</h1>
				<div class="admin-user">
					<img class="admin-avatar" data-admin-image src="" alt="Admin avatar">
					<strong data-admin-username>Admin</strong>
					<button id="logoutBtn" class="ghost" type="button">Logout</button>
				</div>
			</header>

			<p id="layoutError" class="error-msg hidden"></p>
			<p id="inboxLoading" class="loading">Loading messages...</p>
			<p id="inboxError" class="error-msg hidden"></p>

			<section class="table-wrap">
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Email</th>
							<th>Message</th>
							<th>Date Received</th>
						</tr>
					</thead>
					<tbody id="inboxTableBody"></tbody>
				</table>
			</section>
		</main>
	</div>
</body>
</html>
